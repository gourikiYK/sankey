<!DOCTYPE html>
<html lang="ja">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GOURIKIコーポレーション BSサンキースタジオ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%}
.app{display:flex;flex-direction:column;width:100%;min-height:100vh;font-family:'Hiragino Kaku Gothic ProN','Meiryo',sans-serif;background:#f0f0f0}
h1.app-title{font-size:18px;font-weight:700;color:#111;padding:10px 16px;background:#fff;border-bottom:1px solid #ddd;flex-shrink:0}
.app-body{display:flex;flex:1;min-height:0}
.sidebar{width:200px;min-width:200px;background:#fff;border-right:1px solid #ddd;display:flex;flex-direction:column;overflow:hidden}
.sidebar-scroll{overflow-y:auto;flex-shrink:0}
.sidebar-code{flex:1;display:flex;flex-direction:column;min-height:100px;border-top:1px solid #e8e8e8}
.code-box{flex:1;width:100%;border:none;padding:8px 10px;font-size:10px;font-family:monospace;color:#333;background:#fafafa;resize:none;line-height:1.6;outline:none}
.code-box:focus{background:#fff}
.sec-hdr{display:flex;justify-content:space-between;align-items:center;padding:7px 12px;background:#f0f0f0;border-bottom:1px solid #e0e0e0;border-top:1px solid #e0e0e0;cursor:pointer;font-weight:700;font-size:11px;color:#333;user-select:none;flex-shrink:0}
.sec-hdr:first-child{border-top:none}
.sec-body{padding:6px 10px;display:flex;flex-direction:column;gap:4px;border-bottom:1px solid #eee;background:#fff}
.frow{display:flex;align-items:center;gap:4px}
.frow label{width:56px;color:#555;font-size:11px;flex-shrink:0}
.frow input[type=text],.frow select{flex:1;border:1px solid #ccc;border-radius:3px;padding:2px 4px;font-size:11px;color:#333;background:#fff}
.sfield{display:flex;flex-direction:column;gap:1px}
.sfield label{font-size:10px;color:#888}
.sfield input[type=number]{border:1px solid #ccc;border-radius:3px;padding:2px 5px;font-size:11px;width:100%;color:#333;background:#fff}
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}
.chart-hdr{padding:8px 14px 6px;border-bottom:1px solid #e8e8e8;background:#fff;flex-shrink:0}
.chart-title{font-size:16px;font-weight:700;color:#222}
.chart-sub{font-size:10px;color:#888;margin-top:1px}
.chart-area{flex:1;overflow:auto;background:#e8e8e8;display:flex;align-items:flex-start;justify-content:center;padding:10px}
#sk{display:block}
.drag-hint{font-size:10px;color:#aaa;padding:3px 14px;background:#fff;border-top:1px solid #f0f0f0;text-align:center;flex-shrink:0}
.footer{background:#fff;border-top:1px solid #ddd;padding:6px 12px;flex-shrink:0}
.footer-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:4px}
.footer-row:last-child{margin-bottom:0}
.f-item{display:flex;align-items:center;gap:4px;font-size:11px;color:#444;white-space:nowrap}
.f-sep{color:#ddd;padding:0 2px}
.toggle-wrap{position:relative;width:32px;height:17px;display:inline-block}
.toggle-wrap input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:#ccc;border-radius:17px;cursor:pointer;transition:.2s}
.toggle-slider:before{content:'';position:absolute;width:11px;height:11px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
.toggle-wrap input:checked+.toggle-slider{background:#2196F3}
.toggle-wrap input:checked+.toggle-slider:before{transform:translateX(14px)}
.f-slider{-webkit-appearance:none;appearance:none;width:80px;height:4px;border-radius:2px;background:#2196F3;outline:none;cursor:pointer}
.f-slider::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:#2196F3;cursor:pointer}
.f-num{width:44px;border:1px solid #ccc;border-radius:3px;padding:2px 3px;font-size:11px;color:#333;background:#fff;text-align:center}
.f-color{width:26px;height:19px;border:1px solid #ccc;border-radius:3px;padding:1px;cursor:pointer}
.f-chk{display:flex;align-items:center;gap:3px;font-size:11px;color:#444}
.f-chk input{width:12px;height:12px}
.fbtn{padding:4px 9px;border:1px solid #bbb;border-radius:4px;background:#fff;font-size:11px;color:#333;cursor:pointer;white-space:nowrap}
.fbtn:hover{background:#f0f0f0}
.bal-badge{font-size:11px;padding:2px 7px;border-radius:4px;font-weight:500}
</style>
</head>
<body>
<div class="app">
  <h1 class="app-title">GOURIKIコーポレーション BSサンキースタジオ</h1>
  <div class="app-body">
    <div class="sidebar">
      <div class="sidebar-scroll">
        <div class="sec-hdr" onclick="tog('s-basic','ic-basic')">基本情報 <span id="ic-basic">－</span></div>
        <div class="sec-body" id="s-basic">
          <div class="frow"><label>企業名:</label><input type="text" id="company" value="GOURIKI" oninput="draw()"></div>
          <div class="frow"><label>決算期:</label><input type="text" id="period" value="2026年3月期" oninput="draw()"></div>
          <div class="frow"><label>単位:</label>
            <select id="unit" onchange="draw()">
              <option value="1">円</option>
              <option value="10000" selected>万円</option>
              <option value="1000000">百万円</option>
            </select>
          </div>
        </div>
        <div class="sec-hdr" onclick="tog('s-asset','ic-asset')">資産の部 <span id="ic-asset">＋</span></div>
        <div class="sec-body" id="s-asset" style="display:none">
          <div class="sfield"><label>現金及び預金</label><input type="number" id="a1" value="27558" oninput="draw()"></div>
          <div class="sfield"><label>売掛金</label><input type="number" id="a2" value="6634" oninput="draw()"></div>
          <div class="sfield"><label>棚卸資産</label><input type="number" id="a3" value="14023" oninput="draw()"></div>
          <div class="sfield"><label>その他流動資産</label><input type="number" id="a4" value="1275" oninput="draw()"></div>
          <div class="sfield"><label>有形固定資産</label><input type="number" id="a5" value="20435" oninput="draw()"></div>
          <div class="sfield"><label>無形固定資産</label><input type="number" id="a6" value="9738" oninput="draw()"></div>
          <div class="sfield"><label>投資その他の資産</label><input type="number" id="a7" value="4965" oninput="draw()"></div>
        </div>
        <div class="sec-hdr" onclick="tog('s-liab','ic-liab')">負債の部 <span id="ic-liab">＋</span></div>
        <div class="sec-body" id="s-liab" style="display:none">
          <div class="sfield"><label>買掛金</label><input type="number" id="l1" value="4461" oninput="draw()"></div>
          <div class="sfield"><label>短期借入金</label><input type="number" id="l2" value="10000" oninput="draw()"></div>
          <div class="sfield"><label>その他流動負債</label><input type="number" id="l3" value="8632" oninput="draw()"></div>
          <div class="sfield"><label>長期借入金</label><input type="number" id="l4" value="45989" oninput="draw()"></div>
          <div class="sfield"><label>その他固定負債</label><input type="number" id="l5" value="222" oninput="draw()"></div>
        </div>
        <div class="sec-hdr" onclick="tog('s-eq','ic-eq')">純資産の部 <span id="ic-eq">＋</span></div>
        <div class="sec-body" id="s-eq" style="display:none">
          <div class="sfield"><label>資本金</label><input type="number" id="e1" value="8500" oninput="draw()"></div>
          <div class="sfield"><label>資本剰余金</label><input type="number" id="e2" value="2055" oninput="draw()"></div>
          <div class="sfield"><label>利益剰余金</label><input type="number" id="e3" value="5429" oninput="draw()"></div>
          <div class="sfield"><label>自己株式</label><input type="number" id="e4" value="-660" oninput="draw()"></div>
        </div>
      </div>
      <div class="sidebar-code">
        <textarea class="code-box" id="code-input" placeholder="// コード入力&#10;// 例: 現金及び預金 [27557] 資産合計" oninput="parseCode()"></textarea>
      </div>
    </div>

    <div class="main">
      <div class="chart-hdr">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div>
            <div class="chart-title" id="hdr-title">株式会社GOURIKI ｜ XXXX</div>
            <div class="chart-sub" id="hdr-sub">貸借対照表 2026年3月期（万円）｜ Balance Sheet</div>
          </div>
          <div id="bal-badge" class="bal-badge" style="background:#e8f5e9;color:#2e7d32">✓ 一致</div>
        </div>
      </div>
      <div class="chart-area" id="chart-area">
        <svg id="sk" xmlns="http://www.w3.org/2000/svg"></svg>
      </div>
      <div class="drag-hint">ノードをドラッグして移動 ／ ダブルクリックでリセット</div>
    </div>
  </div>

  <div class="footer">
    <div class="footer-row">
      <div class="f-item">簡易版:<label class="toggle-wrap"><input type="checkbox" id="f-simple" onchange="draw()"><span class="toggle-slider"></span></label></div>
      <span class="f-sep">|</span>
      <div class="f-item">テキスト:<label class="toggle-wrap"><input type="checkbox" id="f-text" checked onchange="draw()"><span class="toggle-slider"></span></label></div>
      <span class="f-sep">|</span>
      <div class="f-item">フォントサイズ:<input type="range" class="f-slider" id="f-fontsize" min="7" max="14" value="10" step="0.5" oninput="draw()"></div>
      <span class="f-sep">|</span>
      <div class="f-item">帯の太さ:<input type="range" class="f-slider" id="f-nw" min="6" max="40" value="18" step="1" oninput="draw()"></div>
      <span class="f-sep">|</span>
      <div class="f-item">縦幅:<input type="range" class="f-slider" id="f-scale" min="0.3" max="3.0" value="1.0" step="0.05" oninput="draw()"></div>
      <span class="f-sep">|</span>
      <div class="f-item">間隔:<input type="range" class="f-slider" id="f-pad" min="0" max="40" value="8" step="1" oninput="draw()"></div>
    </div>
    <div class="footer-row">
      <div class="f-item">Size: W:<input type="number" class="f-num" id="svg-w" value="1000" min="200" max="3000" step="10" oninput="draw()"></div>
      <div class="f-item">H:<input type="number" class="f-num" id="svg-h" value="480" min="200" max="2000" step="10" oninput="draw()"></div>
      <span class="f-sep">|</span>
      <div class="f-item">Margins: L:<input type="number" class="f-num" id="mg-l" value="130" min="0" max="300" oninput="draw()"></div>
      <div class="f-item">R:<input type="number" class="f-num" id="mg-r" value="130" min="0" max="300" oninput="draw()"></div>
      <div class="f-item">T:<input type="number" class="f-num" id="mg-t" value="28" min="0" max="100" oninput="draw()"></div>
      <div class="f-item">B:<input type="number" class="f-num" id="mg-b" value="18" min="0" max="100" oninput="draw()"></div>
      <span class="f-sep">|</span>
      <div class="f-item">BG:<input type="color" class="f-color" id="bg-color" value="#ffffff" oninput="draw()"></div>
      <div class="f-chk"><input type="checkbox" id="bg-tr" onchange="draw()"><label for="bg-tr">透明</label></div>
      <div style="margin-left:auto;display:flex;gap:5px">
        <button class="fbtn" onclick="saveSVG()">⬇ 保存</button>
        <button class="fbtn" onclick="resetAll()">↺ リセット</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script>
const DEFAULTS={a1:27558,a2:6634,a3:14023,a4:1275,a5:20435,a6:9738,a7:4965,l1:4461,l2:10000,l3:8632,l4:45989,l5:222,e1:8500,e2:2055,e3:5429,e4:-660};
const FIELD_MAP={'現金及び預金':'a1','売掛金':'a2','棚卸資産':'a3','その他流動資産':'a4','有形固定資産':'a5','無形固定資産':'a6','投資その他の資産':'a7','投資その他':'a7','買掛金':'l1','短期借入金':'l2','その他流動負債':'l3','長期借入金':'l4','その他固定負債':'l5','資本金':'e1','資本剰余金':'e2','利益剰余金':'e3','自己株式':'e4'};
let nodeOffsets={};

function tog(id,icId){
  const el=document.getElementById(id),ic=document.getElementById(icId);
  if(!el||!ic) return;
  const open=el.style.display!=='none';
  el.style.display=open?'none':'flex';
  ic.textContent=open?'＋':'－';
}
function resetAll(){
  Object.entries(DEFAULTS).forEach(([k,v])=>{const e=document.getElementById(k);if(e)e.value=v;});
  document.getElementById('code-input').value='';
  document.getElementById('f-scale').value=1.0;
  document.getElementById('f-pad').value=8;
  nodeOffsets={};draw();
}
function gv(id){return parseFloat(document.getElementById(id).value)||0;}
function pct(v,t){return t?Math.round(v/t*1000)/10:0;}
function fmtVal(raw,unit){
  const v=raw/unit;
  return(Math.abs(v-Math.round(v))<0.05)?Math.round(v).toLocaleString():v.toFixed(1);
}
function parseCode(){
  const lines=document.getElementById('code-input').value.split('\n');
  const totals={};
  lines.forEach(line=>{
    line=line.trim();
    if(!line||line.startsWith('//')) return;
    const m=line.match(/^(.+?)\s*\[(\*|[\d.,]+)\]\s*(.+?)(\s+#[0-9a-fA-F]{3,6})?$/);
    if(!m) return;
    const src=m[1].trim(),val=parseFloat(m[2].replace(/,/g,''))||0;
    if(!totals[src]) totals[src]=0;
    totals[src]+=val;
  });
  Object.entries(totals).forEach(([name,val])=>{
    const fid=FIELD_MAP[name];
    if(fid){const el=document.getElementById(fid);if(el)el.value=Math.round(val);}
  });
  draw();
}

function draw(){
  const unit=+document.getElementById('unit').value;
  const uLabel=unit===1?'円':unit===10000?'万円':'百万円';
  document.getElementById('hdr-title').textContent='株式会社'+(document.getElementById('company').value||'企業名')+' ｜ XXXX';
  document.getElementById('hdr-sub').textContent='貸借対照表 '+(document.getElementById('period').value||'')+'（'+uLabel+'）｜ Balance Sheet';

  const simple=document.getElementById('f-simple').checked;
  const showText=document.getElementById('f-text').checked;
  const fs=parseFloat(document.getElementById('f-fontsize').value);
  const NW=parseInt(document.getElementById('f-nw').value);
  const scaleMulti=parseFloat(document.getElementById('f-scale').value);
  const PAD=parseInt(document.getElementById('f-pad').value);
  const SVG_W=Math.max(200,parseInt(document.getElementById('svg-w').value)||1000);
  const SVG_H=Math.max(200,parseInt(document.getElementById('svg-h').value)||480);
  const bgTransparent=document.getElementById('bg-tr').checked;
  const bgColor=document.getElementById('bg-color').value;
  const ML=parseInt(document.getElementById('mg-l').value)||130;
  const MR=parseInt(document.getElementById('mg-r').value)||130;
  const MT=parseInt(document.getElementById('mg-t').value)||28;
  const MB=parseInt(document.getElementById('mg-b').value)||18;

  const a1=gv('a1'),a2=gv('a2'),a3=gv('a3'),a4=gv('a4');
  const a5=gv('a5'),a6=gv('a6'),a7=gv('a7');
  const l1=gv('l1'),l2=gv('l2'),l3=gv('l3');
  const l4=gv('l4'),l5=gv('l5');
  const e1=gv('e1'),e2=gv('e2'),e3=gv('e3'),e4=gv('e4');
  const tCA=a1+a2+a3+a4,tFA=a5+a6+a7,tA=tCA+tFA;
  const tCL=l1+l2+l3,tFL=l4+l5,tL=tCL+tFL;
  const tE=e1+e2+e3+e4,tLE=tL+tE;

  const diff=tA-tLE;
  const bb=document.getElementById('bal-badge');
  bb.textContent=Math.abs(diff)<1?'✓ 一致':'△ '+fmtVal(Math.abs(diff),unit)+uLabel;
  bb.style.background=Math.abs(diff)<1?'#e8f5e9':'#fff3e0';
  bb.style.color=Math.abs(diff)<1?'#2e7d32':'#e65100';

  const svgEl=document.getElementById('sk');
  svgEl.setAttribute('width',SVG_W);svgEl.setAttribute('height',SVG_H);svgEl.innerHTML='';

  const innerH=SVG_H-MT-MB;
  const scale=(innerH/Math.max(tA,tLE,1))*scaleMulti;
  const usableW=SVG_W-ML-MR;
  const cols=simple?4:6;
  const colW=usableW/cols;
  const x1=ML,x2=ML+colW,x3=ML+colW*2,x4=ML+colW*3,x5=ML+colW*4,x6=ML+colW*5;

  const svg=d3.select(svgEl);
  if(!bgTransparent) svg.append('rect').attr('width',SVG_W).attr('height',SVG_H).attr('fill',bgColor);

  function layoutGroup(items,xPos){
    const bars=items.filter(n=>n.val>0);
    const totalH=bars.reduce((s,n)=>s+n.val*scale,0)+(bars.length-1)*PAD;
    let y=MT+(innerH-totalH)/2;
    bars.forEach(n=>{n.h=Math.max(2,n.val*scale);n.baseY=y;n.x=xPos;n.y=y+(nodeOffsets[n.id]||0);y+=n.h+PAD;});
    return bars;
  }

  const lf=[
    {id:'現金及び預金',val:a1,col:'#666',pct:pct(a1,tA)},
    {id:'売掛金',val:a2,col:'#666',pct:pct(a2,tA)},
    {id:'棚卸資産',val:a3,col:'#666',pct:pct(a3,tA)},
    {id:'その他流動資産',val:a4,col:'#888',pct:pct(a4,tA)},
    {id:'有形固定資産',val:a5,col:'#444',pct:pct(a5,tA)},
    {id:'無形固定資産',val:a6,col:'#444',pct:pct(a6,tA)},
    {id:'投資その他',val:a7,col:'#555',pct:pct(a7,tA)},
  ];
  const ml=[{id:'流動資産',val:tCA,col:'#777',pct:pct(tCA,tA)},{id:'固定資産',val:tFA,col:'#555',pct:pct(tFA,tA)}];
  const mc={id:'資産',val:tA,col:'#333',pct:100};
  const mc2={id:'負債',val:tL,col:'#e74c3c',pct:pct(tL,tLE)};
  const mc3={id:'純資産',val:tE,col:'#27ae60',pct:pct(tE,tLE)};
  const mr=[{id:'流動負債',val:tCL,col:'#e74c3c',pct:pct(tCL,tLE)},{id:'固定負債',val:tFL,col:'#c0392b',pct:pct(tFL,tLE)}];
  const lr=[
    {id:'買掛金',val:l1,col:'#e74c3c',pct:pct(l1,tLE),grp:'cl'},
    {id:'短期借入金',val:l2,col:'#e74c3c',pct:pct(l2,tLE),grp:'cl'},
    {id:'その他流動負債',val:l3,col:'#e57373',pct:pct(l3,tLE),grp:'cl'},
    {id:'長期借入金',val:l4,col:'#c0392b',pct:pct(l4,tLE),grp:'fl'},
    {id:'その他固定負債',val:l5,col:'#d98880',pct:pct(l5,tLE),grp:'fl'},
    {id:'資本金',val:e1,col:'#27ae60',pct:pct(e1,tLE),grp:'eq'},
    {id:'資本剰余金',val:e2,col:'#52be80',pct:pct(e2,tLE),grp:'eq'},
    {id:'利益剰余金',val:e3,col:'#1e8449',pct:pct(e3,tLE),grp:'eq'},
    {id:'自己株式',val:Math.abs(e4),col:'#abebc6',pct:pct(Math.abs(e4),tLE),grp:'eq'},
  ];

  const lf2=lf.filter(n=>n.val>0);
  const ml2=simple?[{id:'資産合計',val:tA,col:'#555',pct:100}]:ml.filter(n=>n.val>0);
  mc.h=Math.max(2,mc.val*scale);mc.baseY=MT+(innerH-mc.h)/2;mc.x=x3;mc.y=mc.baseY+(nodeOffsets[mc.id]||0);
  const rh2=mc2.val*scale+mc3.val*scale+PAD;
  mc2.h=Math.max(2,mc2.val*scale);mc2.baseY=MT+(innerH-rh2)/2;mc2.x=x4;mc2.y=mc2.baseY+(nodeOffsets[mc2.id]||0);
  mc3.h=Math.max(2,mc3.val*scale);mc3.baseY=mc2.baseY+mc2.h+PAD;mc3.x=x4;mc3.y=mc3.baseY+(nodeOffsets[mc3.id]||0);
  const mr2=simple?[]:mr.filter(n=>n.val>0);
  const lr2=simple?[]:lr.filter(n=>n.val>0);

  if(!simple){layoutGroup(lf2.slice(0,4),x1);layoutGroup(lf2.slice(4),x1);}
  else layoutGroup(lf2,x1);
  layoutGroup(ml2,x2);layoutGroup(mr2,x5);

  const lr_cl=lr2.filter(n=>n.grp==='cl'),lr_fl=lr2.filter(n=>n.grp==='fl'),lr_eq=lr2.filter(n=>n.grp==='eq');
  const lr_all=[...lr_cl,...lr_fl,...lr_eq];
  if(lr_all.length){
    const totalH=lr_all.reduce((s,n)=>s+n.val*scale,0)+(lr_all.length-1)*PAD;
    let y=MT+(innerH-totalH)/2;
    lr_all.forEach(n=>{n.h=Math.max(2,n.val*scale);n.baseY=y;n.x=x6;n.y=y+(nodeOffsets[n.id]||0);y+=n.h+PAD;});
  }

  const allNodes=[...lf2,...ml2,mc,mc2,mc3,...mr2,...lr_all];
  const sOff={},tOff={};
  allNodes.forEach(n=>{sOff[n.id]=0;tOff[n.id]=0;});

  const flowsG=svg.append('g'),nodesG=svg.append('g'),labelsG=svg.append('g');

  function buildPath(ax,ay,bx,by,h){
    const cx=(ax+bx)/2;
    return `M${ax},${ay} C${cx},${ay} ${cx},${by} ${bx},${by} L${bx},${by+h} C${cx},${by+h} ${cx},${ay+h} ${ax},${ay+h} Z`;
  }

  const flowDefs=[];
  function addFlow(s,t,ov){
    if(!s||!s.h||!t||!t.h) return;
    const fh=Math.max(1,(ov!=null?ov:s.val)*scale);
    flowDefs.push({sId:s.id,tId:t.id,fh,col:s.col,so:sOff[s.id],to:tOff[t.id]});
    sOff[s.id]+=fh;tOff[t.id]+=fh;
  }

  const mlCA=ml2.find(n=>n.id==='流動資産'),mlFA=ml2.find(n=>n.id==='固定資産'),mlAll=ml2[0];
  if(simple){lf2.forEach(n=>addFlow(n,mlAll));}
  else{lf2.slice(0,4).forEach(n=>addFlow(n,mlCA));lf2.slice(4).forEach(n=>addFlow(n,mlFA));}
  ml2.forEach(n=>addFlow(n,mc));
  addFlow({id:mc.id,h:mc.h,val:mc2.val,col:mc2.col},{id:mc2.id,h:mc2.h,val:mc2.val});
  addFlow({id:mc.id,h:mc.h,val:mc3.val,col:mc3.col},{id:mc3.id,h:mc3.h,val:mc3.val});
  if(!simple){
    mr2.forEach(n=>addFlow(mc2,n,n.val));
    const mr_cl=mr2.find(n=>n.id==='流動負債'),mr_fl=mr2.find(n=>n.id==='固定負債');
    if(mr_cl) lr_cl.forEach(n=>addFlow(mr_cl,n,n.val));
    if(mr_fl) lr_fl.forEach(n=>addFlow(mr_fl,n,n.val));
    lr_eq.forEach(n=>addFlow(mc3,n,n.val));
  }

  function renderFlows(){
    flowsG.selectAll('path').remove();
    flowDefs.forEach(f=>{
      const s=allNodes.find(n=>n.id===f.sId),t=allNodes.find(n=>n.id===f.tId);
      if(!s||!t) return;
      flowsG.append('path').attr('d',buildPath(s.x+NW,s.y+f.so,t.x,t.y+f.to,f.fh)).attr('fill',f.col).attr('opacity',0.5);
    });
  }

  function mkTxt(g,x,y,str,size,col,anchor,weight){
    g.append('text').attr('x',x).attr('y',y).attr('font-size',size).attr('fill',col)
      .attr('text-anchor',anchor||'middle').attr('font-weight',weight||'400')
      .attr('font-family','sans-serif').text(str);
  }

  function renderLabels(){
    labelsG.selectAll('*').remove();
    if(!showText) return;
    allNodes.filter(n=>n.h>0).forEach(n=>{
      const isMid=n.id==='資産'||n.id==='負債'||n.id==='純資産';
      const isLeft=n.x<SVG_W/2-50;
      const cy=n.y+n.h/2;
      const dv=fmtVal(n.val,unit);
      const tx=isLeft?n.x-6:n.x+NW+6;
      const anc=isLeft?'end':'start';
      if(isMid){
        if(n.h>=14){
          mkTxt(labelsG,n.x+NW/2,cy-4,n.pct.toFixed(1)+'%',fs,'#fff','middle');
          mkTxt(labelsG,n.x+NW/2,cy+5,n.id,fs+1,'#fff','middle','700');
          mkTxt(labelsG,n.x+NW/2,cy+fs+6,dv,fs-1,'rgba(255,255,255,0.85)','middle');
        }
        return;
      }
      const isMidNode=['流動資産','固定資産','流動負債','固定負債','資産合計'].includes(n.id);
      const nameSize=isMidNode?fs+1:fs;
      const valSize=fs-1;
      const lineH=fs*1.4;
      const showPct=n.pct>=1;
      if(showPct){
        const blockH=lineH*2;
        const startY=cy-blockH/2;
        mkTxt(labelsG,tx,startY,n.pct.toFixed(1)+'%',valSize,'#e74c3c',anc,'400');
        mkTxt(labelsG,tx,startY+lineH,n.id,nameSize,'#222',anc,isMidNode?'700':'500');
        mkTxt(labelsG,tx,startY+lineH*2,dv,valSize,'#777',anc,'400');
      } else {
        const blockH=lineH;
        const startY=cy-blockH/2;
        mkTxt(labelsG,tx,startY,n.id,nameSize,'#222',anc,isMidNode?'700':'500');
        mkTxt(labelsG,tx,startY+lineH,dv,valSize,'#777',anc,'400');
      }
    });
    mkTxt(labelsG,ML,MT-8,'資産の部',fs,'#999','start');
    mkTxt(labelsG,SVG_W-MR,MT-8,'負債・純資産の部',fs,'#999','end');
    mkTxt(labelsG,SVG_W/2,SVG_H-4,'created with BSサンキースタジオ',8,'#ccc','middle');
  }

  function renderNodes(){
    nodesG.selectAll('g.ng').remove();
    allNodes.filter(n=>n.h>0).forEach(n=>{
      const g=nodesG.append('g').attr('class','ng');
      g.append('rect').attr('x',n.x).attr('y',n.y).attr('width',NW).attr('height',n.h)
        .attr('rx',1).attr('fill',n.col).style('cursor','grab');
      let dy0=0,off0=0;
      g.call(d3.drag()
        .on('start',function(e){dy0=e.y;off0=nodeOffsets[n.id]||0;g.select('rect').attr('opacity',0.75);})
        .on('drag',function(e){
          nodeOffsets[n.id]=off0+(e.y-dy0);n.y=n.baseY+(nodeOffsets[n.id]||0);
          g.select('rect').attr('y',n.y);renderFlows();renderLabels();
        })
        .on('end',function(){g.select('rect').attr('opacity',1);})
      );
      g.on('dblclick',function(){nodeOffsets[n.id]=0;n.y=n.baseY;g.select('rect').attr('y',n.y);renderFlows();renderLabels();});
    });
  }

  renderFlows();renderNodes();renderLabels();
}

function saveSVG(){
  const svg=document.getElementById('sk');
  const blob=new Blob([svg.outerHTML],{type:'image/svg+xml'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='bs_sankey.svg';a.click();
}

window.addEventListener('load',()=>setTimeout(draw,50));
</script>
</body>
